<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Graph Studio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div>
      <h1>Graph Studio</h1>
      <p>Inspect the openResearch graph and focus the `research-pi` skill chain.</p>
    </div>
    <div id="metrics" class="metrics" aria-label="Graph metrics"></div>
  </header>

  <section class="toolbar">
    <input id="search" type="search" placeholder="Search nodes">
    <button id="focus-chain" type="button" class="toolbar-button is-active">Focus `research-pi` chain</button>
    <a class="toolbar-link" href="/">Back to Hub</a>
    <span class="canvas-hint">Drag nodes to rearrange. Scroll the canvas to inspect lower links.</span>
    <div class="legend" aria-label="Edge legend">
      <span><i class="legend-line calls"></i>Calls</span>
      <span><i class="legend-line produces"></i>Produces</span>
      <span><i class="legend-line consumes"></i>Consumes</span>
      <span><i class="legend-line reads"></i>Reads</span>
      <span><i class="legend-line requires"></i>Requires</span>
    </div>
  </section>

  <main>
    <section class="canvas-wrap">
      <svg id="canvas" viewBox="0 0 1600 1200" role="img" aria-label="Graph visualization"></svg>
    </section>
    <aside>
      <section class="panel-section">
        <h2>`research-pi` chain</h2>
        <div id="chain-summary" class="muted">Loading chain...</div>
        <div id="chain-list" class="chain-list"></div>
      </section>
      <section class="panel-section">
        <h2>Selection</h2>
        <pre id="selection">Select a node to inspect its links.</pre>
      </section>
    </aside>
  </main>

  <script src="graph.data.js"></script>
  <script src="app.js"></script>
</body>
</html>
